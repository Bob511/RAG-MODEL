<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giao diện Chat AI Hiện Đại</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />

    <style>
      :root {
        --bg-color: #ffffff;
        --chat-container-bg: #ffffff;
        --user-msg-bg: #f0f4f9; /* Màu xám nhạt đặc trưng của Google */
        --user-text: #1f1f1f;
        --ai-text: #1f1f1f;
        --input-bg: #f0f4f9;
        --primary-color: #0b57d0;
        --border-radius-msg: 24px;
        --max-width: 800px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Inter", sans-serif;
      }

      body {
        background-color: var(--bg-color);
        display: flex;
        flex-direction: column;
        height: 100vh;
        color: #1f1f1f;
      }

      /* Header đơn giản */
      header {
        padding: 16px 24px;
        font-size: 1.2rem;
        font-weight: 500;
        color: #444746;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .ai-logo-header {
        color: var(--primary-color);
      }

      /* Khu vực hiển thị tin nhắn */
      .chat-container {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        scroll-behavior: smooth;
      }

      .message-wrapper {
        width: 100%;
        max-width: var(--max-width);
        display: flex;
        flex-direction: column;
        gap: 24px;
        padding-bottom: 120px; /* Chừa chỗ cho ô input */
      }

      /* Khung tin nhắn chung */
      .message {
        display: flex;
        gap: 16px;
        max-width: 100%;
        animation: fadeIn 0.3s ease-in-out;
      }

      /* Tin nhắn của User */
      .message.user {
        justify-content: flex-end;
      }

      .message.user .content {
        background-color: var(--user-msg-bg);
        color: var(--user-text);
        padding: 12px 20px;
        border-radius: var(--border-radius-msg);
        font-size: 15px;
        line-height: 1.6;
        max-width: 80%;
        word-wrap: break-word;
      }

      /* Tin nhắn của AI */
      .message.ai {
        justify-content: flex-start;
      }

      .message.ai .avatar {
        min-width: 36px;
        height: 36px;
        border-radius: 50%;
        background-color: #e8eaed;
        display: flex;
        justify-content: center;
        align-items: center;
        color: var(--primary-color);
      }

      .message.ai .content {
        padding: 4px 0;
        color: var(--ai-text);
        font-size: 16px;
        line-height: 1.6;
        max-width: 90%;
      }

      /* Khu vực nhập liệu (Bottom bar) */
      .input-container {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0) 0%,
          rgba(255, 255, 255, 1) 30%
        );
        padding: 20px;
        display: flex;
        justify-content: center;
      }

      .input-box {
        width: 100%;
        max-width: var(--max-width);
        background-color: var(--input-bg);
        border-radius: 32px;
        display: flex;
        align-items: center;
        padding: 8px 16px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        transition:
          box-shadow 0.3s ease,
          background-color 0.3s ease;
      }

      .input-box:focus-within {
        background-color: #fff;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      }

      .input-box input {
        flex: 1;
        background: transparent;
        border: none;
        padding: 12px;
        font-size: 16px;
        outline: none;
        color: var(--user-text);
      }

      .input-box input::placeholder {
        color: #757575;
      }

      .send-btn {
        background: transparent;
        border: none;
        color: var(--primary-color);
        cursor: pointer;
        padding: 8px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: background-color 0.2s ease;
      }

      .send-btn:hover {
        background-color: rgba(11, 87, 208, 0.1);
      }

      /* Hiệu ứng gõ chữ (Typing indicator) */
      .typing-indicator {
        display: flex;
        gap: 4px;
        padding: 12px 0;
        align-items: center;
      }

      .dot {
        width: 6px;
        height: 6px;
        background-color: #888;
        border-radius: 50%;
        animation: bounce 1.4s infinite ease-in-out both;
      }

      .dot:nth-child(1) {
        animation-delay: -0.32s;
      }
      .dot:nth-child(2) {
        animation-delay: -0.16s;
      }

      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: scale(0);
        }
        40% {
          transform: scale(1);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background-color: #dadce0;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background-color: #bdc1c6;
      }
    </style>
  </head>
  <body>
    <header>
      <span class="material-symbols-outlined ai-logo-header">auto_awesome</span>
      AI Assistant
    </header>

    <div class="chat-container" id="chat-container">
      <div class="message-wrapper" id="message-wrapper">
        <div class="message ai">
          <div class="avatar">
            <span class="material-symbols-outlined" style="font-size: 20px"
              >auto_awesome</span
            >
          </div>
          <div class="content">
            Xin chào! Mình là trợ lý AI. Mình có thể giúp gì cho bạn hôm nay?
          </div>
        </div>
      </div>
    </div>

    <div class="input-container">
      <div class="input-box">
        <input
          type="text"
          id="chat-input"
          placeholder="Hỏi AI bất cứ điều gì..."
          autocomplete="off"
        />
        <button class="send-btn" id="send-btn" onclick="handleSend()">
          <span class="material-symbols-outlined">send</span>
        </button>
      </div>
    </div>

    <script>
      const chatInput = document.getElementById("chat-input");
      const messageWrapper = document.getElementById("message-wrapper");
      const chatContainer = document.getElementById("chat-container");

      // Hàm cuộn xuống cuối cùng
      function scrollToBottom() {
        chatContainer.scrollTo({
          top: chatContainer.scrollHeight,
          behavior: "smooth",
        });
      }

      // Hàm tạo element tin nhắn
      function appendMessage(sender, text) {
        const msgDiv = document.createElement("div");
        msgDiv.classList.add("message", sender);

        if (sender === "ai") {
          msgDiv.innerHTML = `
                    <div class="avatar">
                        <span class="material-symbols-outlined" style="font-size: 20px;">auto_awesome</span>
                    </div>
                    <div class="content">${text}</div>
                `;
        } else {
          msgDiv.innerHTML = `<div class="content">${text}</div>`;
        }

        messageWrapper.appendChild(msgDiv);
        scrollToBottom();
        return msgDiv; // Trả về element để có thể thao tác sau (ví dụ: update nội dung)
      }

      // Hàm hiển thị trạng thái "AI đang gõ..."
      function showTypingIndicator() {
        const msgDiv = document.createElement("div");
        msgDiv.classList.add("message", "ai");
        msgDiv.id = "typing-indicator";
        msgDiv.innerHTML = `
                <div class="avatar">
                    <span class="material-symbols-outlined" style="font-size: 20px;">auto_awesome</span>
                </div>
                <div class="content">
                    <div class="typing-indicator">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                </div>
            `;
        messageWrapper.appendChild(msgDiv);
        scrollToBottom();
      }

      // Hàm xóa trạng thái "AI đang gõ..."
      function removeTypingIndicator() {
        const indicator = document.getElementById("typing-indicator");
        if (indicator) {
          indicator.remove();
        }
      }

      // Xử lý khi người dùng nhấn gửi
      // Thêm từ khóa async vào hàm
      async function handleSend() {
        const content = chatInput.value.trim();
        if (!content) return;

        // 1. Hiển thị tin nhắn của User
        appendMessage("user", content);
        chatInput.value = "";

        // 2. Hiển thị trạng thái AI đang suy nghĩ
        showTypingIndicator();

        // 3. Gọi API (Bọc trong try...catch để bắt lỗi)
        try {
          const response = await fetch("/auth/chat", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            // Gửi dữ liệu dưới dạng JSON object
            body: JSON.stringify({ content: content }),
          });

          // Kiểm tra xem server có trả về HTTP status lỗi không (ví dụ 404, 500)
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }

          // Lấy dữ liệu phản hồi từ server
          const data = await response.json();

          // 4. Xóa hiệu ứng "đang gõ..."
          removeTypingIndicator();

          // 5. Hiển thị tin nhắn phản hồi từ AI
          // LƯU Ý: Thay 'data.message' bằng key thực tế mà API của bạn trả về
          appendMessage(
            "ai",
            data.message || "Đã nhận được phản hồi, nhưng chưa tìm thấy text.",
          );
        } catch (error) {
          // Xử lý khi có lỗi (mất mạng, server sập, v.v.)
          removeTypingIndicator();
          appendMessage(
            "ai",
            "Xin lỗi, đã có lỗi kết nối xảy ra. Vui lòng thử lại sau.",
          );
          console.error("Lỗi gọi API:", error);
        }
      }

      // Bắt sự kiện phím Enter
      chatInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault(); // Ngăn chặn hành vi mặc định
          handleSend();
        }
      });
    </script>
  </body>
</html>
