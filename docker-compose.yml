services:
  chroma_system:
    image: chromadb/chroma:latest # quy định (ảnh) do bên chromaDB quy định
    container_name: chroma_container # Tên container do ta tự nghĩ ra
    ports:
      - "8000:8000"
    networks:
      - Virtual_Lan

    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma

  Chatbot_model:
    image: rag # tên của image ở phần Dockerfile
    container_name: AI
    depends_on:
      - chroma_system
     # dấu - là list nhưng của Docker, là quy định trong các phần như ports, networks, depend,... 
    networks:
     - Virtual_Lan
    env_file:
     - .env
    volumes:
      - ./infrastructure/volumes/chroma_data:/data_json

networks:
  Virtual_Lan:
    driver: bridge
    # Bridge - tạo 1 công tắc mạng (switch) ảo để nối các thùng
